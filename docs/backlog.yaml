  - id: auto-elevate-skeleton
    title: "Auto-elevate por esqueleto de binario — 2× Y → delegación session-scoped"
    what: |
      Cuando evaluate_chain_aware (M7.10) retorna ask para una pieza de una cadena:
      1. Extraer el esqueleto: el binario base + flag principal si aplica.
         curl -I https://api.coinbase.com/v2/accounts/123 → esqueleto: curl
         git diff colmena-core/src/firewall.rs        → esqueleto: git diff
         cargo test -p colmena-core                   → esqueleto: cargo test
         tee test.log                                 → esqueleto: tee
         head -20                                     → esqueleto: head
      2. Si mismo (agent_type, skeleton) recibe Y del operador 2× en ventana 10min:
         → auto-crear delegación session-scoped con bash_pattern: '^skeleton\b'
      3. Delegación: session-scoped, TTL 1h (max 8h), reason "auto-elevated:2x-confirm"
      4. Audit log registra la elevación
      5. Si operador responde N → reset counter para ese skeleton
      6. Kill switch: trust-firewall.yaml auto_elevate: false
      7. NO aplica a comandos en blocked (nunca se auto-eleva rm -rf, gh pr merge, etc.)
    why: |
      Hash exacto del comando no funciona en práctica: curl api/v2/accounts/123
      y curl api/v2/accounts/456 tienen distinto hash pero son "mismo comando".
      El esqueleto captura la primitiva bash real que el operador está aprobando.
      M7.10 ya hace el split de cadenas — esto capitaliza ese trabajo.
    effort: M
    risk: medium
    blocks: []
    blocked_by: []
    wave: 0
    status: pending
    tags: [feature, ux, firewall, chain-aware]
    produces_pr: true
    memory_ref: project_firewall_auto_elevate_2x_yes.md

