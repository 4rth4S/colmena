name: Code Review Cycle
id: code-review-cycle
source: builtin
description: >
  Developer completes a full feature, then submits for auditor evaluation.
  Iterative loop: developer implements, auditor reviews, feedback cycle
  continues until quality bar is met. Best for focused feature work.
topology: iterative
communication: loop
when_to_use:
  - "Feature implementation with quality review"
  - "Code writing followed by structured review"
  - "Quality improves through repeated refinement"
  - "Feedback loop between implementer and reviewer"
  - "Single developer working on a focused task"
when_not_to_use:
  - "Tasks requiring multiple parallel specialists"
  - "Broad exploration where coverage matters more than depth"
  - "First draft quality is sufficient"
pros:
  - "Low agent count keeps costs manageable"
  - "Output quality improves with each review cycle"
  - "Catches errors through structured critique"
cons:
  - "Only two agents active — limited perspectives"
  - "Convergence not guaranteed for ambiguous requirements"
  - "Diminishing returns after initial review cycles"
estimated_token_cost: low
estimated_agents: "2"
roles_suggested:
  agent: developer
  critic: auditor
elo_lead_selection: false
