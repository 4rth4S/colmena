# Trust Firewall Configuration
# Rule precedence: blocked > restricted > trust_circle > defaults
version: 1

defaults:
  action: ask

trust_circle:
  # Local read operations - always safe
  - tools: [Read, Glob, Grep, Bash]
    conditions:
      bash_pattern: '^(cat|head|tail|less|ls|find|grep|rg|wc|file|stat|which|type|echo|printf|date|uname|whoami|hostname|pwd|env|printenv|id|df|du|free|uptime|ps|sort|uniq|tr|cut|awk|sed|tee|xargs|jq|yq|base64|sha256sum|shasum|md5|openssl dgst|xxd|hexdump|strings)\b'
    action: auto-approve
    reason: 'Read-only local operations'

  # Safe filesystem creation - mkdir never overwrites existing files/dirs
  - tools: [Bash]
    conditions:
      bash_pattern: '^mkdir\b'
    action: auto-approve
    reason: 'Directory creation is non-destructive'

  # Git read operations - always safe
  - tools: [Bash]
    conditions:
      bash_pattern: '^git (log|diff|status|blame|show|branch|tag|remote|stash list|ls-files|rev-parse|describe|shortlog|reflog|config --get|config --list)\b'
    action: auto-approve
    reason: 'Git read-only operations'

  # GitHub/GitLab CLI read operations - safe API reads
  - tools: [Bash]
    conditions:
      bash_pattern: '^(gh (api|repo view|pr view|pr list|pr checks|issue view|issue list|run view|run list|release view|release list|search)|glab (api|repo view|mr view|mr list|issue view|issue list))\b'
    action: auto-approve
    reason: 'GitHub/GitLab CLI read operations'

  # Package managers and build tools (read/build, not install)
  - tools: [Bash]
    conditions:
      bash_pattern: '^(cargo (build|test|check|clippy|fmt|run|bench|doc|tree|metadata)|npm (test|run|list|info|outdated|audit)|npx |pip list|pip show|python -c|node -e|rustc --version|rustup show|brew list|brew info)\b'
    action: auto-approve
    reason: 'Build tools and package manager reads'

  # Piped commands starting with safe operations
  - tools: [Bash]
    conditions:
      bash_pattern: '^(cat|head|tail|echo|printf|curl -s|gh api|glab api) .+\|'
    action: auto-approve
    reason: 'Safe commands piped to processors'

  # Research - auto-approve web fetches for investigation
  - tools: [WebFetch, WebSearch]
    action: auto-approve
    reason: 'Research operations'

  # File writes within project directory
  - tools: [Write, Edit]
    conditions:
      path_within: ['${PROJECT_DIR}']
      path_not_match: ['*.env', '*credentials*', '*secret*', '*.key']
    action: auto-approve
    reason: 'Project-scoped file writes excluding secrets'

  # Task management - internal CC todo tracking, no side effects
  - tools: [TaskCreate, TaskUpdate, TaskGet, TaskList, TaskOutput, TaskStop]
    action: auto-approve
    reason: 'Internal task tracking operations'

  # CC internal tools - no side effects, just orchestration plumbing
  - tools: [Skill, ToolSearch, EnterPlanMode, ExitPlanMode, EnterWorktree, ExitWorktree, SendMessage, AskUserQuestion, NotebookEdit]
    action: auto-approve
    reason: 'CC internal orchestration tools'

restricted:
  # Agent spawning requires human confirmation (Fix 3, DREAD 8.8)
  - tools: [Agent]
    action: ask
    reason: 'Agent spawning requires human review to prevent autonomous chains'

  # Destructive bash commands
  - tools: [Bash]
    conditions:
      bash_pattern: '^(rm|chmod|chown|kill|pkill|curl.*-X|wget.*-O|docker|kubectl)'
    action: ask
    reason: 'Potentially destructive system command'

  # Git push - human confirms target branch, but not blocked
  - tools: [Bash]
    conditions:
      bash_pattern: '^git push\b'
    action: ask
    reason: 'Push to remote requires human confirmation'

  # Peer review operations — human oversees submissions and evaluations
  - tools: [mcp__colmena__review_submit, mcp__colmena__review_evaluate]
    action: ask
    reason: 'Peer review operations require human oversight'

  # External communications
  - tools: [mcp__claude_ai_Slack__slack_send_message, mcp__claude_ai_Atlassian__createJiraIssue]
    action: ask
    reason: 'External communication requires human review'

blocked:
  # Never auto-approve — truly destructive operations (Fix 11: expanded patterns)
  - tools: [Bash]
    conditions:
      bash_pattern: '^(git (push.*--force|push.*-f|reset --hard)|rm\s+-rf\s+/|shred\b|dd\s+if=|mkfs\b|find\s+.*-delete)'
    action: block
    reason: 'Destructive operation requires explicit human confirmation'

# Per-agent overrides (used by ELO engine in M3)
agent_overrides: {}

notifications:
  enabled: true
  say_announcements: false
